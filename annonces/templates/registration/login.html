{% extends 'annonces/base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
  <h1>Connexion</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <button class="button" type="submit">Se connecter</button>
  </form>
{% endblock %}
