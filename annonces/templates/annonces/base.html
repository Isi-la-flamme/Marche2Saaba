<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Marché local{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; }
    header { background: #2c3e50; color: white; padding: 1rem; }
    nav a { color: white; margin-right: 1rem; text-decoration: none; }
    .container { max-width: 900px; margin: 1rem auto; padding: 1rem; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    .button { display: inline-block; margin: .5rem 0; padding: .6rem 1rem; background: #3498db; color: white; text-decoration: none; border-radius: 4px; }
    .button.secondary { background: #7f8c8d; }
    .card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
    .form-control { width: 100%; padding: .6rem; margin: .25rem 0 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row > * { flex: 1; min-width: 160px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Accueil</a>
      {% if request.user.is_authenticated %}
        <a href="/ajouter/">Ajouter une annonce</a>
        <a href="/mes-annonces/">Mes annonces</a>
        <a href="{% url 'logout' %}">Déconnexion</a>
        <span>Bonjour {{ request.user.username }}</span>
      {% else %}
        <a href="{% url 'login' %}">Connexion</a>
        <a href="{% url 'signup' %}">Inscription</a>
      {% endif %}
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
